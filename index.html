<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안전대피 - 서울/경기 대피소 검색</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }
        .main-container { display: flex; width: 100%; height: 100vh; }
        #sidebar { width: 380px; height: 100%; padding: 20px; background: #ffffff; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; display: flex; flex-direction: column; }
        .warning-text { background: #fff3f3; color: #d32f2f; padding: 10px; border-radius: 5px; font-size: 13px; margin-bottom: 15px; border: 1px solid #ffcdd2; }
        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #keyword { flex: 1; padding: 12px; border: 2px solid #ff4d4d; border-radius: 4px; outline: none; }
        #search-btn { padding: 10px 15px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #result-list { list-style: none; overflow-y: auto; flex: 1; }
        #result-list li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        #result-list li:hover { background: #fff5f5; }
        .info-badge { color: #ff4d4d; font-weight: bold; font-size: 12px; }
        #map { flex: 1; height: 100%; }
        .status-msg { font-size: 12px; color: #666; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="sidebar">
            <h2 style="margin-bottom:10px; color:#ff4d4d;">📢 안전대피소 찾기</h2>
            <div id="loading-status" class="status-msg">데이터 로딩 중...</div>
            <div class="warning-text">⚠️ 본 서비스는 <b>서울특별시</b>와 <b>경기도</b> 지역 정보만 제공합니다.</div>
            <div class="search-box">
                <input type="text" id="keyword" placeholder="동네나 건물명을 입력하세요 (예: 종로구, 화정역)" onkeypress="if(event.keyCode==13) searchLocation()">
                <button id="search-btn" onclick="searchLocation()">검색</button>
            </div>
            <ul id="result-list"></ul>
        </div>
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

    <script>
        let map, ps;
        let shelterData = [];
        let markers = [];
        let userLocation = null;

        window.onload = function() {
            initMap();
            loadCsvData();
        };

        function initMap() {
            const container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 4 });
            ps = new kakao.maps.services.Places();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    map.setCenter(userLocation);
                });
            }
        }

        // 1. CSV 로드 (한글 깨짐 방지: encoding 추가)
        function loadCsvData() {
            const files = ['민방위대피시설_서울특별시.csv', '민방위대피시설_경기도.csv'];
            let loadedCount = 0;

            files.forEach(file => {
                Papa.parse(file, {
                    download: true,
                    header: true,
                    encoding: "EUC-KR", // 공공데이터 한글 깨짐 방지 핵심 설정!
                    complete: function(results) {
                        shelterData = shelterData.concat(results.data);
                        loadedCount++;
                        if (loadedCount === files.length) {
                            document.getElementById('loading-status').innerText = `✅ 데이터 ${shelterData.length}건 준비 완료`;
                        }
                    }
                });
            });
        }

        // 2. 검색 시 먼저 장소(동네) 위치 찾기
        function searchLocation() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword.trim()) return alert("검색어를 입력하세요!");

            ps.keywordSearch(keyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    const searchPoint = new kakao.maps.LatLng(data[0].y, data[0].x);
                    findNearbyShelters(searchPoint);
                } else {
                    // 장소 검색 안되면 텍스트로 바로 검색 시도
                    findSheltersByText(keyword);
                }
            });
        }

        // 3. 찾은 위치 주변 대피소 필터링 (반경 2km)
        function findNearbyShelters(point) {
            clearMarkers();
            map.setCenter(point);

            // 거리 계산 및 정렬
            const filtered = shelterData
                .filter(s => s['위도(EPSG4326)'] && s['경도(EPSG4326)'])
                .map(s => {
                    const sPos = new kakao.maps.LatLng(s['위도(EPSG4326)'], s['경도(EPSG4326)']);
                    const dist = getDistance(point, sPos);
                    return { ...s, dist: dist };
                })
                .filter(s => s.dist < 2000) // 2km 이내
                .sort((a, b) => a.dist - b.dist) // 거리순 정렬
                .slice(0, 20); // 상위 20개만

            displayResults(filtered);
        }

        // 4. 텍스트 검색 (예비용)
        function findSheltersByText(keyword) {
            clearMarkers();
            const filtered = shelterData.filter(s => 
                (s['소재지전체주소'] && s['소재지전체주소'].includes(keyword)) ||
                (s['시설명'] && s['시설명'].includes(keyword))
            ).slice(0, 20);
            displayResults(filtered);
        }

        function displayResults(places) {
            const listEl = document.getElementById('result-list');
            listEl.innerHTML = '';
            const bounds = new kakao.maps.LatLngBounds();

            if (places.length === 0) {
                listEl.innerHTML = '<p style="text-align:center; padding:20px;">주변에 대피소가 없습니다.</p>';
                return;
            }

            places.forEach(place => {
                const pos = new kakao.maps.LatLng(place['위도(EPSG4326)'], place['경도(EPSG4326)']);
                const marker = new kakao.maps.Marker({ map: map, position: pos });
                markers.push(marker);
                bounds.extend(pos);

                const li = document.createElement('li');
                li.innerHTML = `
                    <div>
                        <h5>${place['시설명']}</h5>
                        <p style="font-size:12px; color:#666;">${place['도로명전체주소'] || place['소재지전체주소']}</p>
                        <span class="info-badge">${(place.dist/1000).toFixed(1)}km</span>
                        <span style="font-size:11px; margin-left:10px;">수용: ${place['최대수용인원']}명</span>
                    </div>
                `;
                li.onclick = () => {
                    map.panTo(pos);
                    if(confirm("이 대피소로 길찾기를 하시겠습니까?")) {
                        window.open(`https://map.kakao.com/link/to/${place['시설명']},${place['위도(EPSG4326)']},${place['경도(EPSG4326)']}`);
                    }
                };
                listEl.appendChild(li);
            });
            map.setBounds(bounds);
        }

        function getDistance(p1, p2) {
            const line = new kakao.maps.Polyline({ path: [p1, p2] });
            return line.getLength();
        }

        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }
    </script>
</body>
</html>
