<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안전대피 - 주변 대피소 찾기</title>
    <style>
        /* CSS: 레이아웃 및 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }
        .main-container { display: flex; width: 100%; height: 100vh; }

        #sidebar {
            width: 380px; height: 100%; padding: 20px;
            background: #fdfdfd; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10; display: flex; flex-direction: column;
        }

        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #keyword { flex: 1; padding: 12px; border: 2px solid #ff4d4d; border-radius: 4px; outline: none; }
        #search-btn { padding: 10px 15px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        #result-list { list-style: none; overflow-y: auto; flex: 1; }
        #result-list li { 
            padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; 
        }
        #result-list li:hover { background: #fff5f5; }
        #result-list li h5 { color: #333; margin-bottom: 5px; font-size: 16px; }
        #result-list li p { font-size: 13px; color: #666; line-height: 1.4; }
        .info-badge { display: inline-block; margin-top: 5px; font-size: 11px; padding: 2px 6px; background: #eee; border-radius: 10px; color: #444; }
        .distance { color: #ff4d4d; font-weight: bold; }

        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="sidebar">
            <h2 style="margin-bottom:15px; color:#ff4d4d;">🏠 대피소 찾기</h2>
            <div class="search-box">
                <input type="text" id="keyword" placeholder="동네 이름을 입력하세요 (예: 화정동)" onkeypress="if(event.keyCode==13) searchShelters()">
                <button id="search-btn" onclick="searchShelters()">검색</button>
            </div>
            <ul id="result-list">
                <p style="text-align:center; color:#999; margin-top:20px;">지역을 검색하면 주변 대피소가 나타납니다.</p>
            </ul>
        </div>
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

    <script>
        let map; 
        let ps;  
        let markers = []; 
        let userLocation = null; // 사용자의 현재 위치 저장
        let pathLine = null;     // 지도에 그려질 경로(선) 객체

        window.onload = function() {
            initMap();
        };

        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(37.5668, 126.9786),
                level: 5
            };
            map = new kakao.maps.Map(mapContainer, mapOptions);
            ps = new kakao.maps.services.Places();

            getCurrentLocation();
        }

        // 1. 현재 위치 가져오기
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    userLocation = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                    map.setCenter(userLocation);
                    
                    // 내 위치는 기본 파란색 마커
                    new kakao.maps.Marker({
                        map: map,
                        position: userLocation
                    });
                });
            }
        }

        // 2. 대피소 검색 (주소 입력 후 호출)
        function searchShelters() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.trim()) {
                alert('지역명을 입력해주세요!');
                return;
            }

            // 기존 데이터 초기화
            clearOldData();

            // '입력한 주소 + 대피소' 키워드로 검색 실행
            // location 옵션을 주면 현재 내 위치를 기준으로 거리를 계산해줍니다.
            ps.keywordSearch(keyword + " 대피소", placesSearchCB, {
                location: userLocation,
                radius: 5000, // 5km 반경 내
                sort: kakao.maps.services.SortBy.DISTANCE 
            });
        }

        // 3. 검색 결과 콜백
        function placesSearchCB(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else {
                alert('대피소 정보를 찾을 수 없습니다.');
            }
        }

        // 4. 결과 출력 (마커 & 리스트)
        function displayPlaces(places) {
            const listEl = document.getElementById('result-list');
            const bounds = new kakao.maps.LatLngBounds();
            listEl.innerHTML = '';

            // 빨간색 마커 이미지 설정 (카카오 제공 기본 샘플 이미지 활용)
            const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png'; 
            const imageSize = new kakao.maps.Size(24, 35); 
            const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);

            for (let i = 0; i < places.length; i++) {
                const placePos = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 마커 생성 (빨간색 별 마커)
                const marker = new kakao.maps.Marker({
                    position: placePos,
                    image: markerImage,
                    map: map
                });
                markers.push(marker);

                // 리스트 아이템 생성
                const distanceKm = (places[i].distance / 1000).toFixed(1); // 미터를 km로 변환
                const capacity = Math.floor(Math.random() * 500) + 100; // 수용인원 가상 데이터 (100~600명)
                
                const itemEl = document.createElement('li');
                itemEl.innerHTML = `
                    <div>
                        <h5>${places[i].place_name}</h5>
                        <p>${places[i].road_address_name || places[i].address_name}</p>
                        <span class="info-badge">수용 가능 인원: <b>${capacity}명</b></span><br>
                        <span class="info-badge">내 위치에서 <span class="distance">${distanceKm}km</span></span>
                    </div>
                `;

                // 클릭 이벤트: 마커와 리스트 공통
                const clickHandler = function() {
                    drawPath(placePos); // 경로 그리기
                    map.panTo(placePos); // 지도를 해당 위치로 부드럽게 이동
                };

                itemEl.onclick = clickHandler;
                kakao.maps.event.addListener(marker, 'click', clickHandler);

                listEl.appendChild(itemEl);
                bounds.extend(placePos);
            }
            map.setBounds(bounds); // 검색 결과가 다 보이게 지도 범위 조정
        }

        // 5. 직선 경로 그리기 함수
        function drawPath(targetPos) {
            if (!userLocation) {
                alert('현재 위치를 불러오는 중입니다. 잠시만 기다려주세요.');
                return;
            }

            // 기존 선이 있으면 지우기
            if (pathLine) {
                pathLine.setMap(null);
            }

            // 현재 위치에서 대피소까지 직선 연결
            pathLine = new kakao.maps.Polyline({
                path: [userLocation, targetPos], // 시작점(내위치) - 끝점(대피소)
                strokeWeight: 5,
                strokeColor: '#ff4d4d',
                strokeOpacity: 0.8,
                strokeStyle: 'solid'
            });

            pathLine.setMap(map);
        }

        // 6. 초기화 함수
        function clearOldData() {
            // 마커 제거
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];

            // 경로 제거
            if (pathLine) {
                pathLine.setMap(null);
            }

            // 리스트 초기화
            document.getElementById('result-list').innerHTML = '';
        }
    </script>
</body>
</html>
