<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* CSS: 화면 레이아웃 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }

        /* 메인 컨테이너: 왼쪽 사이드바와 오른쪽 지도를 가로로 배치 */
        .main-container { display: flex; width: 100%; height: 100vh; }

        /* 사이드바 스타일 */
        #sidebar {
            width: 350px;
            height: 100%;
            padding: 20px;
            background: #f8f9fa;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #keyword { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        #search-btn { padding: 10px 15px; background: #fee500; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 검색 결과 리스트 스타일 */
        #result-list { list-style: none; overflow-y: auto; flex: 1; }
        #result-list li { 
            padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; 
        }
        #result-list li:hover { background: #fff; }
        #result-list li h5 { color: #333; margin-bottom: 5px; }
        #result-list li p { font-size: 12px; color: #777; }

        /* 지도 영역 */
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="sidebar">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button id="search-btn" onclick="searchPlaces()">검색</button>
            </div>
            <ul id="result-list">
                </ul>
        </div>

        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

    <script>
        let map; // 지도 객체
        let ps;  // 장소 검색 서비스 객체
        let markers = []; // 지도에 표시된 마커를 담을 배열

        // 페이지 로드 시 실행
        window.onload = function() {
            initMap();
        };

        // 지도 초기화 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 위치(서울시청)
                level: 5 // 확대 레벨 5
            };

            // 1. 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 2. 장소 검색 객체 생성
            ps = new kakao.maps.services.Places();

            // 3. 현재 위치 권한 요청 및 지도 중심 이동
            getCurrentLocation();
        }

        // 사용자의 현재 위치를 가져오는 함수
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);

                    // 지도 중심을 내 위치로 이동
                    map.setCenter(locPosition);
                    
                    // 내 위치에 마커 표시 (옵션)
                    displayMarker(locPosition, "내 위치");
                }, function(error) {
                    console.error("위치 권한을 획득하지 못했습니다.", error);
                });
            }
        }

        // 키워드 검색 실행 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            // 카카오 장소 검색 API 호출
            ps.keywordSearch(keyword, placesSearchCB);
        }

        // 장소 검색 결과 콜백 함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 기존 마커 및 리스트 제거
                clearMarkers();
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과 리스트와 마커를 화면에 표시하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('result-list');
            const bounds = new kakao.maps.LatLngBounds();
            listEl.innerHTML = ''; // 이전 결과 삭제

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = displayMarker(placePosition, places[i].place_name);
                const itemEl = getListItem(i, places[i]);

                // 마커와 검색 결과 항목을 클릭했을 때 이벤트 등록
                bounds.extend(placePosition);

                (function(marker, title) {
                    itemEl.onclick = function() {
                        map.panTo(marker.getPosition()); // 해당 위치로 지도 부드럽게 이동
                    };
                })(marker, places[i].place_name);

                listEl.appendChild(itemEl);
            }
            
            // 검색된 장소들이 모두 보이도록 지도 범위 조정
            map.setBounds(bounds);
        }

        // 마커를 생성하고 지도 위에 표시하는 함수
        function displayMarker(position, title) {
            const marker = new kakao.maps.Marker({
                map: map,
                position: position
            });
            markers.push(marker);
            return marker;
        }

        // 검색 결과 리스트 아이템 HTML을 만드는 함수
        function getListItem(index, places) {
            const el = document.createElement('li');
            let itemStr = '<div>' +
                          '   <h5>' + places.place_name + '</h5>';

            if (places.road_address_name) {
                itemStr += '    <p>' + places.road_address_name + '</p>';
            } else {
                itemStr += '    <p>' + places.address_name + '</p>';
            }
            
            itemStr += '  <p class="tel">' + places.phone + '</p>' +
                       '</div>';

            el.innerHTML = itemStr;
            return el;
        }

        // 이전 검색 결과 마커들을 모두 삭제하는 함수
        function clearMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }
    </script>
</body>
</html>
